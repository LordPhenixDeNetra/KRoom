version: '3.8'

services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: kroom-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-netra}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Passer123}
      POSTGRES_DB: ${DB_NAME:-netra_kroom}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Cache et Pub/Sub Redis
  redis:
    image: redis:7-alpine
    container_name: kroom-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # SFU LiveKit
  livekit:
    image: livekit/livekit-server:latest
    container_name: kroom-livekit
    restart: always
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880" # HTTP API
      - "7881:7881" # TCP signaling
      - "7882:7882" # Prometheus metrics
      - "50000-50100:50000-50100/udp" # WebRTC media
    volumes:
      - ./infrastructure/livekit/livekit.yaml:/etc/livekit.yaml
    environment:
      LIVEKIT_KEYS: "devkey_kroom_safe_key_32_chars_long: secret_kroom_safe_secret_32_chars_long_long"

  # Backend Fastify
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: kroom-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-netra}:${DB_PASSWORD:-Passer123}@postgres:5432/${DB_NAME:-netra_kroom}?schema=public
      - REDIS_URL=redis://redis:6379
      - LIVEKIT_URL=http://livekit:7880
      - LIVEKIT_API_KEY=devkey_kroom_safe_key_32_chars_long
      - LIVEKIT_API_SECRET=secret_kroom_safe_secret_32_chars_long_long
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-change-this-in-prod}
      - NODE_ENV=production
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
      - livekit

  # Frontend Next.js
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: kroom-frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_LIVEKIT_URL=ws://localhost:7880
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # Serveur TURN/STUN Coturn (Optionnel si LiveKit gère tout, mais recommandé pour la prod)
  coturn:
    image: coturn/coturn:latest
    container_name: kroom-coturn
    restart: always
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
    volumes:
      - ./infrastructure/docker/turnserver.conf:/etc/coturn/turnserver.conf

volumes:
  postgres_data:
  redis_data:
